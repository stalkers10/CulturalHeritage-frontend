<ion-content [fullscreen]="true">
  <div class="login-overlay">
    <div class="login-container">

      <header class="header-section">
        <h1 class="login-title">
          NEW <br/> <span>PASSWORD</span>
        </h1>
        <div class="accent-line"></div>
      </header>

      <div class="form-cluster">
        <div class="otp-info">
          <p class="otp-kicker">Identity confirmed. Enter your new password below.</p>
        </div>

        <form (ngSubmit)="onReset()">
          <div class="input-group">
            <label class="field-label">New Password</label>
            <ion-item lines="none" class="custom-input">
              <span class="material-symbols-outlined" slot="start">key</span>
              <ion-input
                [type]="showPassword ? 'text' : 'password'"
                placeholder="At least 6 characters"
                [(ngModel)]="newPassword"
                name="newPassword"
                required>
              </ion-input>
              <ion-button type="button" fill="clear" slot="end" class="view-password" (click)="togglePassword()">
                <span class="material-symbols-outlined">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
              </ion-button>
            </ion-item>
          </div>

          <div class="input-group">
            <label class="field-label">Confirm Password</label>
            <ion-item lines="none" class="custom-input">
              <span class="material-symbols-outlined" slot="start">key</span>
              <ion-input
                [type]="showConfirm ? 'text' : 'password'"
                placeholder="Repeat your new password"
                [(ngModel)]="confirmPassword"
                name="confirmPassword"
                required>
              </ion-input>
              <ion-button type="button" fill="clear" slot="end" class="view-password" (click)="toggleConfirm()">
                <span class="material-symbols-outlined">{{ showConfirm ? 'visibility_off' : 'visibility' }}</span>
              </ion-button>
            </ion-item>
          </div>

          <div class="login-action">
            <ion-button expand="block" type="submit" class="enter-button" [disabled]="isResetting">
              {{ isResetting ? 'Updating...' : 'Reset Password' }}
            </ion-button>
          </div>
        </form>
      </div>

    </div>
  </div>
</ion-content>
