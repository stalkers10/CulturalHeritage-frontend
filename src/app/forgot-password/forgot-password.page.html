<ion-content [fullscreen]="true">
  <div class="login-overlay">
    <div class="login-container">

      <header class="header-section">
        <h1 class="login-title">
          LOST YOUR <br/> <span>PASSWORD?</span>
        </h1>
        <div class="accent-line"></div>
      </header>

      <div class="form-cluster">
        <div class="otp-info">
          <p class="otp-kicker">Enter your email or username and we will send a verification code to your registered address.</p>
        </div>

        <form (ngSubmit)="onSubmit()">
          <div class="input-group">
            <label class="field-label">Email or Username</label>
            <ion-item lines="none" class="custom-input">
              <span class="material-symbols-outlined" slot="start">person_search</span>
              <ion-input
                placeholder="Enter your email or username"
                [(ngModel)]="identity"
                name="identity"
                required>
              </ion-input>
            </ion-item>
          </div>

          <div class="login-action">
            <ion-button expand="block" type="submit" class="enter-button" [disabled]="isSubmitting">
              {{ isSubmitting ? 'Sending code...' : 'Send Reset Code' }}
            </ion-button>
          </div>
        </form>

        <div class="form-footer">
          <p class="footer-note">Remember your password? <a routerLink="/login">Back to Login</a></p>
        </div>
      </div>

    </div>
  </div>
</ion-content>
